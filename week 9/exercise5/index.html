<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forms & Validation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Registration Form</h1>
    <p>Complete all required fields to create your account.</p>
  </header>

  <main>

    <!-- Success message -->
    <div id="success-message" class="hidden">
      <h2>🎉 Registration Successful!</h2>
      <p>Welcome aboard! Your account has been created.</p>
    </div>

    <form id="registration-form" novalidate>

      <!-- Full Name -->
      <div class="form-group">
        <label for="full-name">Full Name *</label>
        <input type="text" id="full-name" name="full-name" placeholder="Jane Doe" />
        <span class="error-msg" id="error-full-name"></span>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email *</label>
        <input type="email" id="email" name="email" placeholder="jane@example.com" />
        <span class="error-msg" id="error-email"></span>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password *</label>
        <input type="password" id="password" name="password" placeholder="Enter password" />
        <span id="password-strength" class="strength-bar"></span>
        <span class="error-msg" id="error-password"></span>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label for="confirm-password">Confirm Password *</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm password" />
        <span class="error-msg" id="error-confirm-password"></span>
      </div>

      <!-- Age -->
      <div class="form-group">
        <label for="age">Age *</label>
        <input type="number" id="age" name="age" placeholder="18" />
        <span class="error-msg" id="error-age"></span>
      </div>

      <!-- Country -->
      <div class="form-group">
        <label for="country">Country *</label>
        <select id="country" name="country">
          <option value="">Select your country</option>
          <option value="north-macedonia">North Macedonia</option>
          <option value="albania">Albania</option>
          <option value="kosovo">Kosovo</option>
          <option value="turkey">Turkey</option>
          <option value="other">Other</option>
        </select>
        <span class="error-msg" id="error-country"></span>
      </div>

      <!-- Bio -->
      <div class="form-group">
        <label for="bio">Short Bio *</label>
        <textarea id="bio" name="bio" placeholder="Tell us about yourself"></textarea>
        <small id="char-count">0 / 200 characters</small>
        <span class="error-msg" id="error-bio"></span>
      </div>

      <!-- Terms -->
      <div class="form-group checkbox-group">
        <label>
          <input type="checkbox" id="terms" name="terms" />
          I agree to the terms and conditions *
        </label>
        <span class="error-msg" id="error-terms"></span>
      </div>

      <!-- Account Type -->
      <div class="form-group">
        <label for="account-type">Account Type *</label>
        <select id="account-type" name="account-type">
          <option value="">Choose account type</option>
          <option value="student">Student</option>
          <option value="personal">Personal</option>
          <option value="business">Business</option>
        </select>
        <span class="error-msg" id="error-account-type"></span>
      </div>

      <!-- Submit Button -->
      <div class="form-group">
        <button type="submit" id="submit-btn">Create Account</button>
      </div>

    </form>

  </main>

  <footer>
    <p>Week 9 · Exercise 5 · Forms & Validation</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
